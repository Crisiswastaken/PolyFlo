name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Polyflo ${{ github.ref_name }}
          releaseBody: |
            ## Polyflo ${{ github.ref_name }}

            ### Fixes in v1.0.1
            - Fix settings stuck on "Loading…" in production builds (missing Tauri IPC permissions)
            - Fix settings window not reopening after close (hide instead of destroy)
            - Fix API key save and verify persistence in OS credential manager
            - Restore hotkey after closing settings or cancelling hotkey capture

            See the [README](https://github.com/${{ github.repository }}#install) for setup instructions.

            **Windows:** run the `.exe` installer from the assets below.
            **macOS:** open the `.dmg` and drag Polyflo to Applications.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

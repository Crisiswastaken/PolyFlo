# Git Bash shadows MSVC `link.exe` with GNU `/usr/bin/link`.
# Build from PowerShell/CMD, or install Visual Studio Build Tools and set:
#
# [target.x86_64-pc-windows-msvc]
# linker = "C:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\VC\\Tools\\MSVC\\14.xx\\bin\\Hostx64\\x64\\link.exe"

[env]
RUSTFLAGS = ""
